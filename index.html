<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Exclusivo</title>
    <!-- Google Fonts: Inter y Outfit para estilo moderno -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Outfit:wght@300;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-animation"></div>
    
    <main class="form-container">
        <header class="form-header">
            <h1>Regístrate Ahora</h1>
            <p>Déjanos tus datos para ponernos en contacto.</p>
        </header>
        
        <form id="registroForm">
            <div class="input-group">
                <label for="nombres">Nombres</label>
                <input type="text" id="nombres" name="Nombres" placeholder="Ej. Juan Carlos" required>
            </div>
            
            <div class="input-group">
                <label for="apellidos">Apellidos</label>
                <input type="text" id="apellidos" name="Apellidos" placeholder="Ej. Pérez Gómez" required>
            </div>
            
            <div class="input-group">
                <label for="correo">Correo Electrónico</label>
                <input type="email" id="correo" name="Correo" placeholder="juan@ejemplo.com" required>
            </div>
            
            <div class="input-group">
                <label for="celular">Celular</label>
                <input type="tel" id="celular" name="Celular" placeholder="Ej. +52 55 1234 5678" required>
            </div>
            
            <button type="submit" class="submit-btn" id="submitBtn">
                <span class="btn-text">Enviar Registro</span>
            </button>
            
            <p class="form-message success" id="successMsg" style="display: none;">¡Registro enviado con éxito!</p>
            <p class="form-message error" id="errorMsg" style="display: none;">Hubo un error al enviar. Intenta de nuevo.</p>
        </form>
    </main>
    
    <!-- Script temporalmente vacío; aquí implementaremos la conexión (Paso 3) -->
    <script src="app.js"></script>
</body>
</html>
